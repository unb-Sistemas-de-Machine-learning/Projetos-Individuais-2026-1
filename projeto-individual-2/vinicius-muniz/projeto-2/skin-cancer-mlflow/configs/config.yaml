project:
  name: skin-cancer-detection
  version: 0.1.0

data:
  raw_dir: data/raw
  processed_dir: data/processed
  image_size: 224
  test_split: 0.2
  val_split: 0.1
  random_seed: 42

model:
  hf_model_id: Anwarkh1/Skin_Cancer-Image_Classification
  local_dir: models/pretrained
  labels:
    - benign
    - malignant
  label_map:
    benign: [melanocytic_Nevi, benign_keratosis-like_lesions, dermatofibroma, vascular_lesions]
    malignant: [melanoma, basal_cell_carcinoma, actinic_keratoses]

mlflow:
  tracking_uri: ./mlruns
  experiment_name: skin-cancer-detection
  registered_model_name: skin-cancer-classifier

guardrails:
  min_confidence: 0.70
  skin_tone_check: true
  max_image_mb: 10
  allowed_formats: [jpg, jpeg, png]
  skin_tone_ita_min: 55.0

inference:
  host: 0.0.0.0
  port: 8000
